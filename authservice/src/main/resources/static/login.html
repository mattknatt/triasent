<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · Triasent</title>
    <style>
        :root {
            --bg:#f7fafb; --surface:#ffffff; --surface-soft:#f1f5f9;
            --border:#e5e9f0; --border-soft:#eef2f6;
            --accent:#14b8a6; --accent-deep:#0f766e; --accent-soft:#ccfbf1;
            --muted:#6b7280; --text:#1f2937;
            --shadow-md:0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.04);
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Inter',system-ui,-apple-system,"Segoe UI",sans-serif;
               background:var(--bg); color:var(--text); min-height:100vh;
               display:flex; align-items:center; justify-content:center;
               -webkit-font-smoothing:antialiased; }
        .wrap { width:100%; max-width:400px; padding:2rem 1.5rem; }
        .brand { text-align:center; font-weight:600; font-size:1.9rem;
                 letter-spacing:-.02em; color:var(--accent-deep);
                 display:flex; align-items:center; justify-content:center; gap:.55rem;
                 margin-bottom:.35rem; }
        .brand-mark { width:34px; height:34px; border-radius:10px;
                      background:linear-gradient(135deg, var(--accent), var(--accent-deep));
                      display:inline-flex; align-items:center; justify-content:center;
                      color:#fff; font-size:1rem; font-weight:700; }
        .tagline { text-align:center; color:var(--muted); font-size:.92rem;
                   margin:0 0 1.75rem; }
        .card { background:var(--surface); border:1px solid var(--border-soft);
                border-radius:16px; padding:1.75rem; box-shadow:var(--shadow-md); }
        h1 { margin:0 0 1.25rem; font-size:1.05rem; font-weight:600; }
        label { display:block; font-size:.78rem; color:var(--muted);
                margin:.85rem 0 .35rem; font-weight:500; }
        label:first-of-type { margin-top:0; }
        input { width:100%; padding:.7rem .85rem; border:1px solid var(--border);
                border-radius:10px; font-size:.95rem; background:var(--surface);
                font-family:inherit; color:var(--text);
                transition:border-color .15s, box-shadow .15s; }
        input:focus { outline:none; border-color:var(--accent);
                      box-shadow:0 0 0 3px var(--accent-soft); }
        button { font:inherit; cursor:pointer; border:none; border-radius:10px;
                 padding:.75rem 1.1rem; background:var(--accent); color:#fff;
                 width:100%; font-weight:600; margin-top:1.25rem;
                 transition:background .15s, transform .05s; }
        button:hover { background:var(--accent-deep); }
        button:active { transform:translateY(1px); }
        .notice { font-size:.82rem; padding:.65rem .85rem; border-radius:10px;
                  margin-bottom:1rem; line-height:1.4; display:none; }
        .notice.err { background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; }
        .notice.ok  { background:var(--accent-soft); color:var(--accent-deep);
                      border:1px solid #99f6e4; }
        .footnote { text-align:center; color:var(--muted); font-size:.78rem;
                    margin-top:1.5rem; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand"><span class="brand-mark">T</span>Triasent</div>
    <p class="tagline">Sign in to continue to your care chat.</p>

    <div class="card">
        <h1>Welcome back</h1>
        <div id="errorNotice" class="notice err">The username or password is incorrect. Please try again.</div>
        <div id="logoutNotice" class="notice ok">You have been signed out.</div>

        <form method="post" action="/login">
            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" autofocus required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit">Sign in</button>
        </form>
    </div>

    <p class="footnote">Protected by Triasent identity service.</p>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    if (params.has('error'))  document.getElementById('errorNotice').style.display = 'block';
    if (params.has('logout')) document.getElementById('logoutNotice').style.display = 'block';
</script>
</body>
</html>
