spring.application.name=authservice
server.port=9000

spring.grpc.client.default-channel.address=${userservice.host:localhost}:8083
spring.grpc.client.default-channel.secure=false

auth.issuer-uri=http://${authservice.host:127.0.0.1}:9000

# Raw OAuth client secrets, injected from the oauth-clients Secret; not stored here.
oauth.gateway-client.secret=${GATEWAY_CLIENT_SECRET}
oauth.bot-client.secret=${BOT_CLIENT_SECRET}

