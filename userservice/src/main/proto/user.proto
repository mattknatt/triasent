syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.example.grpc";
option java_outer_classname = "UserProto";

package user;

service UserService {
  rpc GetUserProfile (GetUserRequest) returns (UserProfile);
}

message GetUserRequest {
  string user_id = 1;
}

message UserProfile {
  string id = 1;
  string username = 2;
  string role = 3;
}