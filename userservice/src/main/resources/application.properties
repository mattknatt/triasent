spring.application.name=userservice
server.port=8083

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.url=jdbc:postgresql://${postgres.host:localhost}:5432/users_db
spring.datasource.username=users_app
# Password is injected via the SPRING_DATASOURCE_PASSWORD env from a Kubernetes Secret;
# it is intentionally NOT stored here.