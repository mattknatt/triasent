spring.application.name=botservice

#LLM Credentials
llm.api.url=${LLM_API_URL}
llm.api.key=${LLM_API_KEY}
llm.api.model=${LLM_API_MODEL}
llm.api.allowed-origin=${ALLOWED_ORIGIN}

# RabbitMQ connection (points at the triasent "rabbitmq" service in k8s; localhost otherwise)
spring.rabbitmq.host=${rabbitmq.host:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=app
# Password injected via SPRING_RABBITMQ_PASSWORD env from a Kubernetes Secret; not stored here.
# A failed delivery is retried in-process a few times, then rejected WITHOUT requeue so
# it is dead-lettered to the DLQ instead of looping forever.
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3

# Messaging topology. exchange + routing-key MUST match what messageservice publishes.
app.messaging.exchange=messages.exchange
app.messaging.routing-key=message.published
app.messaging.queue=bot.message.published
app.messaging.dlx=bot.dlx
app.messaging.dlq=bot.message.published.dlq

# The bot's own account. Events authored by this username are skipped so the bot's
# replies don't re-trigger it (loop prevention).
app.bot.username=bot

# OAuth2 client-credentials so the bot can post replies to messageservice as "bot".
# The token subject = client-id = "bot", which becomes the message author.
spring.security.oauth2.client.registration.bot.provider=authservice
spring.security.oauth2.client.registration.bot.client-id=bot
spring.security.oauth2.client.registration.bot.client-secret=bot-secret
spring.security.oauth2.client.registration.bot.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.bot.scope=message.write
spring.security.oauth2.client.provider.authservice.token-uri=http://${authservice.host:127.0.0.1}:9000/oauth2/token

# Where the bot posts replies (messageservice POST /messages).
app.messageservice.url=http://${messageservice.host:localhost}:8081
