<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Triasent Chat</title>
    <style>
        :root {
            --bg:#f7fafb; --surface:#ffffff; --surface-soft:#f1f5f9;
            --border:#e5e9f0; --border-soft:#eef2f6;
            --accent:#14b8a6; --accent-deep:#0f766e; --accent-soft:#ccfbf1;
            --handler:#2563eb;
            --muted:#6b7280; --text:#1f2937;
            --shadow-sm:0 1px 2px rgba(15,23,42,.04);
            --shadow-md:0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.04);
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Inter',system-ui,-apple-system,"Segoe UI",sans-serif;
               background:var(--bg); color:var(--text); height:100vh;
               display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }

        /* ---------- greeting ---------- */
        #greeting { margin:auto; width:100%; max-width:400px; padding:2rem 1.5rem; }
        .brand { font-weight:600; letter-spacing:-.02em; }
        #greeting .brand { text-align:center; font-size:1.9rem; color:var(--accent-deep);
                           margin-bottom:.35rem; }
        #greeting .tagline { text-align:center; color:var(--muted); font-size:.92rem;
                             margin:0 0 1.75rem; }
        .card { background:var(--surface); border:1px solid var(--border-soft);
                border-radius:16px; padding:1.5rem; box-shadow:var(--shadow-md); }
        .card + .card { margin-top:1rem; }
        .card h2 { margin:0 0 1rem; font-size:1.05rem; font-weight:600; }
        label { display:block; font-size:.78rem; color:var(--muted); margin:.85rem 0 .35rem;
                font-weight:500; }
        input, select { width:100%; padding:.65rem .8rem; border:1px solid var(--border);
                        border-radius:10px; font-size:.95rem; background:var(--surface);
                        font-family:inherit; color:var(--text);
                        transition:border-color .15s, box-shadow .15s; }
        input:focus, select:focus { outline:none; border-color:var(--accent);
                                    box-shadow:0 0 0 3px var(--accent-soft); }
        button { font:inherit; cursor:pointer; border:none; border-radius:10px;
                 padding:.7rem 1.1rem; transition:background .15s, transform .05s; }
        button:active { transform:translateY(1px); }
        .btn-primary { background:var(--accent); color:#fff; width:100%; font-weight:600; }
        .btn-primary:hover { background:var(--accent-deep); }
        .btn-ghost { background:transparent; color:var(--accent-deep); font-weight:600; }
        .btn-ghost:hover { background:var(--surface-soft); }
        .hint { font-size:.82rem; margin:.85rem 0 0; min-height:1em; }
        .hint.ok { color:var(--accent-deep); } .hint.err { color:#b91c1c; }

        /* ---------- chat ---------- */
        #chat { display:none; flex-direction:column; height:100vh; max-width:840px;
                width:100%; margin:0 auto; background:var(--surface); }
        header { display:flex; align-items:center; justify-content:space-between;
                 padding:1rem 1.5rem; background:var(--surface);
                 border-bottom:1px solid var(--border-soft); }
        header .brand { font-size:1.15rem; display:flex; align-items:center; gap:.6rem;
                        color:var(--text); }
        .brand-mark { width:30px; height:30px; border-radius:9px;
                      background:linear-gradient(135deg, var(--accent), var(--accent-deep));
                      display:inline-flex; align-items:center; justify-content:center;
                      color:#fff; font-size:.85rem; font-weight:700; letter-spacing:0; }

        #messages { flex:1; overflow-y:auto; padding:1.75rem 1.5rem;
                    display:flex; flex-direction:column; gap:1rem; background:var(--bg); }

        /* message rows */
        .msg { display:flex; gap:.6rem; max-width:78%; align-items:flex-end; }
        .msg.user { align-self:flex-start; }
        .msg.bot  { align-self:flex-end; flex-direction:row-reverse; }

        .avatar { width:32px; height:32px; border-radius:50%; flex-shrink:0;
                  display:flex; align-items:center; justify-content:center;
                  font-size:.72rem; font-weight:700; color:#fff;
                  background:var(--muted); }
        .msg.bot .avatar { background:linear-gradient(135deg, var(--accent), var(--accent-deep)); }
        .msg.handler .avatar { background:var(--handler); }

        .bubble { background:var(--surface); border:1px solid var(--border-soft);
                  border-radius:16px; padding:.7rem .95rem; box-shadow:var(--shadow-sm); }
        .msg.user .bubble { border-bottom-left-radius:4px; }
        .msg.bot .bubble  { border-bottom-right-radius:4px;
                            background:linear-gradient(180deg, #f0fdfa, #ffffff);
                            border-color:#a7f3d0; }

        .meta { display:flex; align-items:center; gap:.5rem; margin-bottom:.25rem;
                font-size:.72rem; }
        .msg.bot .meta { justify-content:flex-end; }
        .name { font-weight:600; color:var(--text); font-size:.8rem; }
        .time { color:var(--muted); }
        .badge { font-size:.6rem; font-weight:700; padding:.14rem .55rem; border-radius:999px;
                 color:#fff; text-transform:uppercase; letter-spacing:.05em; }
        .badge.bot { background:var(--accent-deep); }
        .badge.handler { background:var(--handler); }
        .text { white-space:pre-wrap; word-break:break-word; line-height:1.5; font-size:.94rem; }

        /* composer */
        .composer { display:flex; gap:.6rem; padding:1rem 1.5rem;
                    background:var(--surface); border-top:1px solid var(--border-soft); }
        .composer input { flex:1; padding:.8rem 1.1rem; border-radius:999px;
                          background:var(--surface-soft); border-color:transparent; }
        .composer input:focus { background:var(--surface); border-color:var(--accent); }
        .composer button { background:var(--accent); color:#fff; font-weight:600;
                           padding:.8rem 1.5rem; border-radius:999px; }
        .composer button:hover { background:var(--accent-deep); }
        .empty { color:var(--muted); text-align:center; margin:auto;
                 font-size:.95rem; max-width:280px; line-height:1.55; }
    </style>
</head>
<body>

<!-- ===================== GREETING ===================== -->
<div id="greeting" hidden>
    <div class="brand">Triasent</div>
    <p class="tagline">Your calm space for care conversations.</p>

    <div class="card">
        <h2>Welcome back</h2>
        <button class="btn-primary" onclick="login()">Log in</button>
    </div>

    <div class="card">
        <h2>Create an account</h2>
        <label for="username">Username</label>
        <input id="username" autocomplete="off">
        <label for="password">Password</label>
        <input id="password" type="password">
        <label for="role">Role</label>
        <select id="role">
            <option value="CUSTOMER">Customer</option>
            <option value="HANDLER">Handler</option>
        </select>
        <div style="margin-top:.9rem"><button class="btn-primary" onclick="createAccount()">Create account</button></div>
        <p class="hint" id="createHint"></p>
    </div>
</div>

<!-- ===================== CHAT ===================== -->
<div id="chat" hidden>
    <header>
        <span class="brand"><span class="brand-mark">T</span>Triasent</span>
        <button class="btn-ghost" onclick="logout()">Log out</button>
    </header>
    <div id="messages"><div class="empty">Loading…</div></div>
    <form class="composer" onsubmit="send(event)">
        <input id="messageInput" placeholder="Type a message…" autocomplete="off" required>
        <button type="submit">Send</button>
    </form>
</div>

<script>
    const BOT_USERNAME = 'bot';
    let pollTimer = null;
    let loadingMessages = false;

    // ---- view state ----
    async function checkAuth() {
        try {
            // A logged-out request to a protected route is redirected to login (opaque to fetch).
            const r = await fetch('/api/messages', {redirect: 'manual'});
            if (r.type === 'opaqueredirect' || r.status === 0 || r.status === 401) showGreeting();
            else showChat();
        } catch (_) { showGreeting(); }
    }
    function showGreeting() {
        // inline display overrides the `hidden` attr and the #id CSS rules
        document.getElementById('greeting').style.display = 'block';
        document.getElementById('chat').style.display = 'none';
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }
    function showChat() {
        document.getElementById('greeting').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        loadMessages();
        if (!pollTimer) pollTimer = setInterval(loadMessages, 3000);
    }

    // ---- auth actions ----
    function login() { window.location.href = '/oauth2/authorization/authservice'; }
    function logout() { window.location.href = '/logout'; }
    async function createAccount() {
        const hint = document.getElementById('createHint');
        const body = {
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            role: document.getElementById('role').value,
        };
        if (!body.username || !body.password) {
            hint.className = 'hint err'; hint.textContent = 'Username and password are required.'; return;
        }
        const r = await fetch('/api/users', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
        });
        if (r.ok) { hint.className = 'hint ok'; hint.textContent = `Account "${body.username}" created — now log in.`; }
        else { hint.className = 'hint err'; hint.textContent = `Could not create account (HTTP ${r.status}).`; }
    }

    // ---- messages ----
    async function send(e) {
        e.preventDefault();
        const input = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content) return;
        input.value = '';
        await fetch('/api/messages', {
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ content }),
        });
        loadMessages();
    }
    async function loadMessages() {
        if (loadingMessages) return;
        loadingMessages = true;
        try {
            const r = await fetch('/api/messages');
            if (!r.ok) {
                if (r.status === 401) showGreeting();
                return;
            }
            renderMessages(await r.json());
        } finally {
        loadingMessages = false;
        }
    }
    function badgeFor(m) {
        if (m.username === BOT_USERNAME) return { cls: 'bot', label: 'Bot' };
        if (m.authorRole === 'HANDLER') return { cls: 'handler', label: 'Handler' };
        return null;
    }
    function renderMessages(messages) {
        const box = document.getElementById('messages');
        const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
        box.innerHTML = '';
        if (!messages.length) {
            const e = document.createElement('div');
            e.className = 'empty';
            e.textContent = 'No messages yet. Share what’s on your mind — Triasent is here to listen.';
            box.appendChild(e); return;
        }
        // API returns newest-first; show oldest at the top like a normal chat.
        messages.slice().reverse().forEach(m => {
            const isBot = m.username === BOT_USERNAME;
            const isHandler = !isBot && m.authorRole === 'HANDLER';

            const msg = document.createElement('div');
            msg.className = 'msg ' + (isBot ? 'bot' : (isHandler ? 'user handler' : 'user'));

            const avatar = document.createElement('div'); avatar.className = 'avatar';
            avatar.textContent = (m.username || '?').charAt(0).toUpperCase();
            msg.appendChild(avatar);

            const bubble = document.createElement('div'); bubble.className = 'bubble';

            const meta = document.createElement('div'); meta.className = 'meta';
            const name = document.createElement('span'); name.className = 'name';
            name.textContent = m.username;                     // textContent => XSS-safe
            meta.appendChild(name);

            const b = badgeFor(m);
            if (b) {
                const badge = document.createElement('span');
                badge.className = 'badge ' + b.cls; badge.textContent = b.label;
                meta.appendChild(badge);
            }
            const time = document.createElement('span'); time.className = 'time';
            time.textContent = m.createdAt
                ? new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            meta.appendChild(time);

            const text = document.createElement('div'); text.className = 'text';
            text.textContent = m.content;
            bubble.appendChild(meta); bubble.appendChild(text);
            msg.appendChild(bubble);
            box.appendChild(msg);
        });
        if (atBottom) box.scrollTop = box.scrollHeight;
    }

    checkAuth();
</script>
</body>
</html>
