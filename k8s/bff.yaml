apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      containers:
        - name: bff
          image: bff:0.0.1-SNAPSHOT
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: AUTHSERVICE_HOST
              value: authservice
            - name: MESSAGESERVICE_HOST
              value: messageservice
            - name: USERSERVICE_HOST
              value: userservice
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_AUTHSERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-clients
                  key: gateway-client-secret
---
apiVersion: v1
kind: Service
metadata:
  name: bff                             # the nginx client proxies to host "bff" on 8080
spec:
  selector:
    app: bff
  ports:
    - port: 8080
      targetPort: 8080
