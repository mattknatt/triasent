apiVersion: apps/v1
kind: Deployment
metadata:
  name: messageservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messageservice
  template:
    metadata:
      labels:
        app: messageservice
    spec:
      containers:
        - name: messageservice
          image: messageservice:0.0.1-SNAPSHOT
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: POSTGRES_HOST
              value: messages-db              # dedicated Bitnami Postgres for messageservice
            - name: SPRING_DATASOURCE_PASSWORD # messages_app password, from the chart's Secret
              valueFrom:
                secretKeyRef:
                  name: messages-db
                  key: password
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PASSWORD   # rabbitmq 'app' password, from the chart's Secret
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: rabbitmq-password
            - name: USERSERVICE_HOST
              value: userservice
            - name: AUTHSERVICE_HOST
              value: authservice
            - name: APP_BOT_USER_ID           # shared with authservice/botservice
              value: "00000000-0000-0000-0000-000000000b07"
---
apiVersion: v1
kind: Service
metadata:
  name: messageservice
spec:
  selector:
    app: messageservice
  ports:
    - port: 8081
      targetPort: 8081
