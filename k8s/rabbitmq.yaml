apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management   # public image -> downloaded
          ports:
            - containerPort: 5672         # messaging
            - containerPort: 15672        # management web UI
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq                          # other pods reach it at host "rabbitmq"
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp                          # multi-port Services need a name per port
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
