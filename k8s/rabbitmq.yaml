apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
spec:
  serviceName: rabbitmq          # must match the headless Service below
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management   # public image -> downloaded
          ports:
            - containerPort: 5672         # messaging
            - containerPort: 15672        # management web UI
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq   # mnesia data dir -> survives restarts
  # The pod is always "rabbitmq-0", so its hostname (and thus the rabbit@rabbitmq-0 node
  # name the data dir is keyed to) stays stable across restarts. That stability is why
  # persistence needs a StatefulSet, not a Deployment.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq                          # other pods reach it at host "rabbitmq"
spec:
  clusterIP: None                         # headless: required to govern the StatefulSet
  selector:
    app: rabbitmq
  ports:
    - name: amqp                          # multi-port Services need a name per port
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
