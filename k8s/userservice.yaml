apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      containers:
        - name: userservice
          image: userservice:0.0.1-SNAPSHOT
          imagePullPolicy: Never        # your own image -> use the local one, don't download
          ports:
            - containerPort: 8083
          env:
            - name: POSTGRES_HOST
              value: users-db                 # dedicated Bitnami Postgres for userservice
            - name: SPRING_DATASOURCE_PASSWORD # users_app password, from the chart's Secret
              valueFrom:
                secretKeyRef:
                  name: users-db
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: userservice                     # reachable by other pods at host "userservice"
spec:
  selector:
    app: userservice
  ports:
    - port: 8083
      targetPort: 8083
