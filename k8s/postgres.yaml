apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data        # replaces the "postgres_data" named volume in compose
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine   # public image -> Kubernetes downloads it (no imagePullPolicy: Never)
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: root
            - name: POSTGRES_PASSWORD
              value: root             # plaintext like compose; see README for the Secret upgrade
            - name: POSTGRES_DB
              value: users_db
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d   # init-db.sh runs here on first start
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init
          configMap:
            name: postgres-init       # created by create-configmaps.sh
            defaultMode: 0755         # make the .sh executable
---
apiVersion: v1
kind: Service
metadata:
  name: postgres                      # other pods reach the DB at host "postgres"
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
