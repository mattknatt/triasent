apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres          # must match the headless Service below
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine   # public image -> Kubernetes downloads it (no imagePullPolicy: Never)
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: root
            - name: POSTGRES_PASSWORD
              value: root             # plaintext like compose; see README for the Secret upgrade
            - name: POSTGRES_DB
              value: users_db
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d   # init-db.sh runs here on first start
      volumes:
        - name: init
          configMap:
            name: postgres-init       # created by create-configmaps.sh
            defaultMode: 0755         # make the .sh executable
  # StatefulSet manages the PVC itself (replaces the standalone PVC we had as a Deployment).
  # This creates a PVC named "data-postgres-0", tied to the pod's identity.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres                      # other pods reach the DB at host "postgres"
spec:
  clusterIP: None                     # headless: required to govern the StatefulSet
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
