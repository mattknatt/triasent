spring.application.name=messageservice
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://${authservice.host:127.0.0.1}:9000
server.port=8081

spring.grpc.client.default-channel.address=${userservice.host:localhost}:8083
spring.grpc.client.default-channel.secure=false

spring.datasource.url=jdbc:postgresql://${postgres.host:localhost}:5432/messages_db
spring.datasource.username=messages_app
# Password is injected via the SPRING_DATASOURCE_PASSWORD env from a Kubernetes Secret;
# it is intentionally NOT stored here.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.rabbitmq.host=${rabbitmq.host:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=app
# Password injected via SPRING_RABBITMQ_PASSWORD env from a Kubernetes Secret; not stored here.
# Correlated publisher confirms give the relay a per-message ack/nack so it can advance
# good rows and retry only the failed ones (see OutboxRelay#flush).
spring.rabbitmq.publisher-confirm-type=correlated
# Publisher returns surface unroutable messages (acked by the broker but matching no
# queue) so the relay can retry/park them instead of silently dropping them. Mandatory
# publishing is set on the custom RabbitTemplate bean (RabbitConfig), since the
# spring.rabbitmq.template.* properties don't apply to a user-defined template bean.
spring.rabbitmq.publisher-returns=true

app.messaging.exchange=messages.exchange
app.messaging.routing-key=message.published
# How often the outbox relay polls for unpublished events.
app.outbox.poll-interval-ms=1000
# After this many failed publish attempts a row is parked (producer-side dead letter).
app.outbox.max-attempts=5
